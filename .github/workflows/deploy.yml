name: Deploy Static Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Insecure Harbor Registry
        run: |
          echo '{
            "insecure-registries" : ["'${{ secrets.HARBOR_URL }}'"]
          }' | sudo tee /etc/docker/daemon.json

          sudo systemctl restart docker

      - name: Login to Harbor Registry
        run: |
          docker login http://${{ secrets.HARBOR_URL }} \
            -u "${{ secrets.HARBOR_USERNAME }}" \
            -p "${{ secrets.HARBOR_PASSWORD }}"

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.HARBOR_URL }}/library/version-app:${{ github.run_number }} .

      - name: Push Version Tagged Image
        run: |
          docker push ${{ secrets.HARBOR_URL }}/library/version-app:${{ github.run_number }}

      - name: Tag Latest Image
        run: |
          docker tag \
          ${{ secrets.HARBOR_URL }}/library/version-app:${{ github.run_number }} \
          ${{ secrets.HARBOR_URL }}/library/version-app:latest

      - name: Push Latest Image
        run: |
          docker push ${{ secrets.HARBOR_URL }}/library/version-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            docker login http://${{ secrets.HARBOR_URL }} \
              -u "${{ secrets.HARBOR_USERNAME }}" \
              -p "${{ secrets.HARBOR_PASSWORD }}"

            docker pull ${{ secrets.HARBOR_URL }}/library/version-app:latest

            docker stop version-app || true
            docker rm version-app || true

            docker run -d \
              --name version-app \
              -p 8080:80 \
              ${{ secrets.HARBOR_URL }}/library/version-app:latest
