name: Deploy Static Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure Insecure Harbor Registry
        run: |
          echo '{
            "insecure-registries" : ["98.93.99.192"]
          }' | sudo tee /etc/docker/daemon.json

          sudo systemctl restart docker

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login 98.93.99.192 \
          -u 'robot$github' \
          --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t 98.93.99.192/test-lab/mysite:latest .

      - name: Push Docker Image
        run: |
          docker push 98.93.99.192/test-lab/mysite:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo '{
              "insecure-registries" : ["172.31.21.99","98.93.99.192"]
            }' | sudo tee /etc/docker/daemon.json

            sudo systemctl restart docker

            echo "${{ secrets.HARBOR_PASSWORD }}" | docker login 172.31.21.99 \
            -u 'robot$github' \
            --password-stdin

            docker pull 172.31.21.99/test-lab/mysite:latest

            docker stop mysite || true
            docker rm mysite || true

            docker run -d \
              --name mysite \
              -p 8080:80 \
              172.31.21.99/test-lab/mysite:latest
