name: Deploy Static Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            cd /home/ubuntu

            if [ ! -d "myapp" ]; then
              git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git myapp
            else
              cd myapp
              git pull origin main
              cd ..
            fi

            cd myapp

            docker build -t 172.31.21.99/test-lab/mysite:latest .

            docker push 172.31.21.99/test-lab/mysite:latest

            docker stop mysite || true
            docker rm mysite || true

            docker run -d \
              --name mysite \
              -p 8080:80 \
              172.31.21.99/test-lab/mysite:latest
