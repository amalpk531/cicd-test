```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Version Showcase</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#0f172a;
        color:white;
    }

    .version-card{
        width:420px;
        padding:30px;
        border-radius:20px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.15);
        backdrop-filter:blur(10px);
        box-shadow:
            0 0 20px rgba(0,0,0,0.5),
            inset 0 0 15px rgba(255,255,255,0.05);
        position:relative;
        overflow:hidden;
    }

    .version-card::before{
        content:"";
        position:absolute;
        width:180px;
        height:180px;
        background:linear-gradient(135deg,#3b82f6,#8b5cf6);
        top:-80px;
        right:-80px;
        border-radius:50%;
        opacity:0.3;
    }

    .title{
        font-size:28px;
        font-weight:bold;
        margin-bottom:25px;
        position:relative;
        z-index:2;
    }

    .info-box{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:14px 18px;
        margin-bottom:15px;
        border-radius:12px;
        background:rgba(255,255,255,0.06);
        border:1px solid rgba(255,255,255,0.08);
        position:relative;
        z-index:2;
    }

    .label{
        color:#94a3b8;
        font-size:14px;
        letter-spacing:1px;
        text-transform:uppercase;
    }

    .value{
        font-size:18px;
        font-weight:600;
    }

    .footer{
        margin-top:15px;
        text-align:center;
        color:#94a3b8;
        font-size:13px;
        position:relative;
        z-index:2;
    }
</style>
</head>

<body>

<div class="version-card">

    <div class="title">
        Application Version
    </div>

    <div class="info-box">
        <div class="label">Version</div>
        <div class="value">v2.4.1</div>
    </div>

    <div class="info-box">
        <div class="label">Date</div>
        <div class="value" id="date"></div>
    </div>

    <div class="info-box">
        <div class="label">Time</div>
        <div class="value" id="time"></div>
    </div>

    <div class="footer">
        System Build Information
    </div>

</div>

<script>

function updateDateTime(){

    const now = new Date();

    const dateOptions = {
        year:'numeric',
        month:'long',
        day:'numeric'
    };

    const timeOptions = {
        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit'
    };

    document.getElementById("date").innerText =
        now.toLocaleDateString('en-US', dateOptions);

    document.getElementById("time").innerText =
        now.toLocaleTimeString('en-US', timeOptions);
}

updateDateTime();

setInterval(updateDateTime,1000);

</script>

</body>
</html>
```
